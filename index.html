<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Planner App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Meal Planner App</h1>
    <p>Your weekly cooking and grocery guide.</p>

    <section id="today-section" class="card">
      <h2>Today</h2>
      <div id="today-content"></div>
    </section>

    <section id="week-section" class="card">
      <h2>Weekly Plan</h2>
      <div id="week-content"></div>
    </section>

    <section id="recipe-section" class="card">
      <h2>Recipe Details</h2>
      <div id="recipe-content">Click a recipe to see details.</div>
    </section>

    <section id="grocery-section" class="card">
      <h2>Grocery List</h2>
      <div id="grocery-content"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
