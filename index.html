<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Planner App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>Meal Planner App</h1>
      <p class="subtitle">A simple weekly cooking planner with recipes, today’s tasks, and grocery list.</p>
    </header>

    <section class="card">
      <h2>Today</h2>
      <div id="today-content"></div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Weekly Plan</h2>
        <button id="show-all-recipes" class="secondary-btn">Show all recipes</button>
      </div>
      <div id="week-content"></div>
    </section>

    <section class="card">
      <h2>Recipe Details</h2>
      <div id="recipe-content">Click a recipe from the weekly plan to see details here.</div>
    </section>

    <section class="card">
      <h2>Grocery List</h2>
      <div id="grocery-content"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
